<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pano Transition Test</title>

    <style>
      :root {
        --frame-radius: 22px;
        --frame-border: rgba(255, 255, 255, 0.08);
        --frame-shadow: 0 18px 60px rgba(0, 0, 0, 0.55);
        --ui-safe-bottom: 16px;
        --player-root-bg: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), #2e1a47;

        /* Listing-site material tokens */
        --midnight-purple: #2e1a47;
        --midnight-purple-hover: #3a2159;
        --midnight-purple-active: #24143a;
        --chrome-stroke-material: linear-gradient(
          125deg,
          #f8fbff 0%,
          #aab3c1 14%,
          #ffffff 27%,
          #7d8797 41%,
          #e8edf5 56%,
          #5f6876 72%,
          #f6f9ff 86%,
          #8f99a8 100%
        );
        --chrome-specular-top: rgba(255, 255, 255, 0.62);
        --chrome-specular-edge: rgba(245, 250, 255, 0.42);
        --chrome-depth-shadow: rgba(10, 14, 24, 0.46);
        --container-stroke-width: 3px;
        --ui-responsive-scale: 1;
        --desktop-primary-ui-scale: 0.85;
        --desktop-nav-ui-scale: 0.9;
        --desktop-doll-ui-scale: 0.75;

        /* NAV COLORS */
        --nav-bg: #ffffff;
        --nav-bg-hover: var(--midnight-purple-hover);
        --nav-text: #111111;
        --nav-disabled: rgba(255, 255, 255, 0.35);

        /* TABS (inverted, intuitive)
           - Active: light
           - Inactive: dark
        */
        --tab-inactive-bg: #241339;
        --tab-inactive-bg-hover: var(--midnight-purple);
        --tab-inactive-text: rgba(255, 255, 255, 0.98);

        --tab-active-bg: #56347d;
        --tab-active-bg-hover: #63408f;
        --tab-active-text: rgba(255, 255, 255, 0.98);

        /* ===== Button system ===== */
        --btn-radius: 16px;

        /* stroke settings (only used when .hasStroke is present) */
        --btn-inner-stroke: 3px;
        --btn-stroke-inset: 4px;

        /* scale system (tabs + doll buttons) */
        --tab-scale-inactive: 0.94;
        --tab-scale-active: 1.03;
        --view-tabs-width: 392px;
      }

      @media (max-width: 1440px), (max-height: 920px) {
        :root {
          --ui-responsive-scale: 0.97;
        }
      }

      @media (max-width: 1180px), (max-height: 820px) {
        :root {
          --ui-responsive-scale: 0.94;
        }
      }

      @media (max-width: 980px), (max-height: 720px) {
        :root {
          --ui-responsive-scale: 0.91;
        }
      }

      @media (max-width: 820px), (max-height: 640px) {
        :root {
          --ui-responsive-scale: 0.88;
        }
      }

      html,
      body,
      #playerShell,
      #playerStage,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      html,
      body {
        min-width: 0;
        min-height: 0;
        background: transparent;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          sans-serif;
      }

      #playerShell {
        position: absolute;
        inset: 0;
        padding: 0;
        box-sizing: border-box;
        background: var(--player-root-bg);
      }

      #playerStage {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #app {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background: transparent;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* =============================
         BUTTON BASE
         - NO stroke by default
         - hover inverts bg/text
      ============================== */

      .uiBtn {
        appearance: none;
        cursor: pointer;

        border: var(--container-stroke-width) solid transparent;

        height: calc(52px * var(--ui-responsive-scale));
        padding: 0 calc(18px * var(--ui-responsive-scale));
        border-radius: var(--btn-radius);

        font-size: calc(13px * var(--ui-responsive-scale));
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;

        background: var(--btn-bg);
        color: var(--btn-text);

        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.65),
          0 8px 16px rgba(10, 14, 24, 0.18);

        position: relative;
        isolation: isolate;

        transition:
          transform 120ms ease,
          box-shadow 120ms ease,
          background 120ms ease,
          color 120ms ease;
      }

      /* ✅ Stroke is opt-in now */
      .uiBtn.hasStroke::after {
        content: "";
        position: absolute;
        inset: var(--btn-stroke-inset);
        border-radius: calc(var(--btn-radius) - var(--btn-stroke-inset));
        border: var(--btn-inner-stroke) solid;
        border-image: var(--chrome-stroke-material) 1;
        background: none;
        pointer-events: none;
        opacity: 0;
        transition: opacity 120ms ease;
      }

      /* ✅ Hover only applies to NON-active buttons */
      .uiBtn:hover:not(:disabled):not(.active) {
        transform: translateY(-1px);
        box-shadow:
          inset 0 1px 0 var(--chrome-specular-top),
          inset 0 -1px 0 rgba(89, 102, 124, 0.64),
          inset 1px 0 0 var(--chrome-specular-edge),
          0 14px 28px rgba(10, 14, 24, 0.5);

        background:
          linear-gradient(var(--btn-bg-hover), var(--btn-bg-hover)) padding-box,
          var(--chrome-stroke-material) border-box;
        background-clip: padding-box, border-box;
        color: var(--btn-text-hover);
      }

      /* only relevant if stroke exists */
      .uiBtn.hasStroke:hover:not(:disabled):not(.active)::after {
        opacity: 0;
      }

      /* ✅ Active press only applies to NON-active buttons */
      .uiBtn:active:not(:disabled):not(.active) {
        transform: translateY(0);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.45),
          inset 0 -1px 0 rgba(89, 102, 124, 0.62),
          inset 1px 0 0 rgba(245, 250, 255, 0.35),
          0 8px 14px rgba(10, 14, 24, 0.42);
      }

      /* ✅ Selected button feels "locked" */
      .uiBtn.active {
        cursor: default;
      }

      .uiBtn:disabled {
        opacity: 0.45;
        cursor: default;
        transform: none;
        box-shadow: none;
      }

      /* =============================
         TABS (top-left)
      ============================== */

      #tabs {
        position: absolute;
        left: calc(14px * var(--ui-responsive-scale));
        top: calc(14px * var(--ui-responsive-scale));
        width: calc(var(--view-tabs-width) * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
        box-sizing: border-box;
        z-index: 20;
        display: inline-flex;
        align-items: flex-start;
        gap: calc(10px * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
        padding: calc(10px * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.10);
      }

      #interiorStack {
        display: inline-flex;
        flex-direction: column;
        gap: 0;
      }

      #pano360Control {
        position: absolute;
        left: calc(14px * var(--ui-responsive-scale));
        top: calc(98px * var(--ui-responsive-scale));
        width: calc(var(--view-tabs-width) * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
        box-sizing: border-box;
        z-index: 20;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: calc(10px * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
      }

      #pano360Control.hidden {
        display: none;
      }

      #pano360Label {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: calc(29px * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
        padding: 0 calc(18px * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
        border-radius: 14px;
        background: var(--midnight-purple);
        color: rgba(255, 255, 255, 0.98);
        font-size: calc(14px * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: none;
        user-select: none;
      }

      #pano360Switch {
        position: relative;
        width: calc(118px * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
        height: calc(42px * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
        border: 0;
        border-radius: 999px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: #ffffff;
        font-size: calc(11px * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: linear-gradient(90deg, #161020 0 50%, #2e1a47 50% 100%);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.20),
          0 10px 20px rgba(8, 4, 14, 0.45);
      }

      #pano360Switch:disabled {
        opacity: 0.45;
        cursor: default;
      }

      #pano360Switch .offText,
      #pano360Switch .onText {
        position: absolute;
        top: 50%;
        width: 50%;
        transform: translateY(-50%);
        z-index: 3;
        color: #ffffff;
        text-align: center;
        pointer-events: none;
      }

      #pano360Switch .offText {
        left: 0;
      }

      #pano360Switch .onText {
        right: 0;
      }

      #pano360Switch .switchKnob {
        position: absolute;
        left: calc(4px * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
        top: calc(3px * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
        width: calc(50px * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
        height: calc(34px * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
        border-radius: 999px;
        border: 1px solid rgba(165, 176, 195, 0.95);
        background:
          linear-gradient(155deg, #f8fbff 0%, #d6deea 34%, #ffffff 56%, #c4cedd 100%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.78),
          0 2px 8px rgba(10, 14, 24, 0.35);
        z-index: 2;
        transition: transform 160ms ease;
      }

      #pano360Switch.isOn .switchKnob {
        transform: translateX(calc(60px * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale)));
      }

      #pano360Switch:not(.isOn) .offText {
        color: #111111;
      }

      #pano360Switch.isOn .onText {
        color: #111111;
      }

      #tabPano {
        position: relative;
        z-index: 2;
      }

      .tabBtn {
        min-width: calc(181px * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
        height: calc(66px * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
        padding: 0 calc(23px * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
        border-radius: 20px;
        font-size: calc(16.6px * var(--desktop-primary-ui-scale) * var(--ui-responsive-scale));
        justify-content: center;
        text-align: center;

        /* inactive theme */
        --btn-bg: var(--tab-inactive-bg);
        --btn-text: var(--tab-inactive-text);

        /* inactive hover invert */
        --btn-bg-hover: var(--midnight-purple);
        --btn-text-hover: rgba(255, 255, 255, 0.98);

        /* stroke colors (only used if .hasStroke exists) */
        --btn-stroke: var(--tab-inactive-text);
        --btn-stroke-hover: var(--tab-active-text);

        transform: scale(var(--tab-scale-inactive));
        transform-origin: left center;

        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          background 140ms ease,
          color 140ms ease;
      }

      /* ✅ Hover only for NON-active tabs */
      .tabBtn:hover:not(.active) {
        transform: scale(calc(var(--tab-scale-inactive) + 0.02)) translateY(-1px);
      }

      .tabBtn:active:not(.active) {
        transform: scale(calc(var(--tab-scale-inactive) + 0.01));
      }

      .tabBtn.active {
        /* active theme (light) */
        --btn-bg: var(--tab-active-bg);
        --btn-text: var(--tab-active-text);

        background:
          linear-gradient(var(--tab-active-bg), var(--tab-active-bg)) padding-box,
          var(--chrome-stroke-material) border-box;
        background-clip: padding-box, border-box;

        transform: scale(var(--tab-scale-active));
        box-shadow:
          0 12px 28px rgba(0,0,0,0.38),
          inset 0 1px 0 rgba(255,255,255,0.10);
      }

      .tabBtn:not(.active) {
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.22),
          inset 0 -1px 0 rgba(8, 4, 14, 0.72),
          0 12px 24px rgba(8, 4, 14, 0.52);
      }

      /* ✅ REMOVE active hover/active animation (selected tab stays still) */
      /* (intentionally no .tabBtn.active:hover or :active rules) */

      /* Brand link (top-right) */
      #brandLink {
        position: absolute;
        top: calc(14px * var(--ui-responsive-scale));
        right: calc(14px * var(--ui-responsive-scale));
        z-index: 20;

        display: inline-flex;
        align-items: center;
        gap: calc(10px * var(--ui-responsive-scale));

        padding: calc(12px * var(--ui-responsive-scale)) calc(14px * var(--ui-responsive-scale));
        border-radius: 999px;

        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.10);

        color: rgba(255, 255, 255, 0.92);
        text-decoration: none;
        font-size: calc(13px * var(--ui-responsive-scale));
        letter-spacing: 0.02em;
        user-select: none;

        transition: transform 120ms ease, background 120ms ease;
      }

      #brandLink:hover {
        background: rgba(0, 0, 0, 0.60);
        transform: translateY(-1px);
      }

      #brandLink:active {
        transform: translateY(0px);
      }

      #brandLogo {
        height: calc(24px * var(--ui-responsive-scale));
        width: auto;
        display: block;
      }

      #brandText {
        line-height: 1;
        white-space: nowrap;
        transition: color 120ms ease;
      }

      #brandLink:hover #brandText {
        color: var(--midnight-purple);
      }

      #brandText.hidden,
      #brandLogo.hidden {
        display: none;
      }

      /* Transition video */
      #transitionVideo {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 5;
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
        background: #000;
      }

      /* =============================
         NAVIGATION (no stroke now)
      ============================== */

      #indicator {
        position: absolute;
        left: 50%;
        bottom: calc(var(--ui-safe-bottom) + calc(26px * var(--ui-responsive-scale)));
        transform: translateX(-50%);
        z-index: 12;

        padding: calc(10px * var(--ui-responsive-scale)) calc(15px * var(--ui-responsive-scale));
        border-radius: 999px;
        border: var(--container-stroke-width) solid transparent;
        font-size: calc(16px * var(--ui-responsive-scale));
        font-weight: 650;
        color: rgba(255, 255, 255, 0.92);
        background:
          linear-gradient(var(--midnight-purple), var(--midnight-purple)) padding-box,
          var(--chrome-stroke-material) border-box;
        background-clip: padding-box, border-box;
        box-shadow:
          inset 0 1px 0 var(--chrome-specular-top),
          inset 0 -1px 0 rgba(89, 102, 124, 0.56),
          inset 1px 0 0 var(--chrome-specular-edge),
          0 10px 18px rgba(10, 14, 24, 0.35);
        letter-spacing: 0.08em;
        user-select: none;
      }

      #enterHomeWrap {
        position: absolute;
        left: 50%;
        bottom: calc(var(--ui-safe-bottom) + calc(4px * var(--ui-responsive-scale)));
        transform: translateX(-50%);
        z-index: 12;
        display: inline-block;
        text-align: center;
        animation: enterHomeFloat 1.1s ease-in-out infinite;
        transition: opacity 160ms ease;
      }

      #enterHomeWrap.hidden {
        display: none;
        opacity: 0;
        pointer-events: none;
      }

      #enterHomeWrap:hover {
        animation-play-state: paused;
      }
      #enterHomeWrap:hover::after {
        animation-play-state: paused;
      }

      #enterHomeWrap::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: calc(-14px * var(--ui-responsive-scale));
        width: 110%;
        height: calc(18px * var(--ui-responsive-scale));
        border-radius: 999px;
        background: rgba(10, 14, 24, 0.42);
        filter: blur(6px);
        transform: translateX(-50%);
        pointer-events: none;
        z-index: 1;
        animation: startCardShadowCounter 1.1s ease-in-out infinite;
      }

      #navWrap {
        position: absolute;
        right: calc(14px * var(--ui-responsive-scale));
        bottom: var(--ui-safe-bottom);
        z-index: 12;
        display: flex;
        gap: calc(12px * var(--ui-responsive-scale));
        transition: opacity 160ms ease;
      }

      #navWrap.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #nav {
        display: inline-flex;
        gap: calc(12px * var(--ui-responsive-scale));
      }

      #nav button {
        height: calc(87px * var(--desktop-primary-ui-scale) * var(--desktop-nav-ui-scale) * var(--ui-responsive-scale));
        padding: 0 calc(33px * var(--desktop-primary-ui-scale) * var(--desktop-nav-ui-scale) * var(--ui-responsive-scale));
        font-size: calc(21px * var(--desktop-primary-ui-scale) * var(--desktop-nav-ui-scale) * var(--ui-responsive-scale));
        letter-spacing: 0.14em;
        min-width: calc(180px * var(--desktop-primary-ui-scale) * var(--desktop-nav-ui-scale) * var(--ui-responsive-scale));

        --btn-bg: var(--tab-active-bg);
        --btn-text: rgba(255, 255, 255, 0.98);

        --btn-bg-hover: #ffffff;
        --btn-text-hover: #111111;

        background:
          linear-gradient(var(--btn-bg), var(--btn-bg)) padding-box,
          var(--chrome-stroke-material) border-box;
        background-clip: padding-box, border-box;
        box-shadow:
          0 12px 28px rgba(0,0,0,0.38),
          inset 0 1px 0 rgba(255,255,255,0.10);
      }

      #nav button:hover:not(:disabled):not(.active) {
        background: #ffffff;
        color: var(--midnight-purple);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.75),
          0 10px 18px rgba(10, 14, 24, 0.22);
      }

      /* =============================
         DOLLHOUSE SUB BUTTONS (tab-style)
         - Active: light, bigger, NO stroke
         - Inactive: dark, smaller, HAS stroke
      ============================== */

      #dollBtns {
        position: absolute;
        right: calc(14px * var(--ui-responsive-scale));
        bottom: var(--ui-safe-bottom);
        z-index: 12;

        display: inline-flex;
        gap: calc(12px * var(--ui-responsive-scale));

        padding: calc(10px * var(--ui-responsive-scale));
        border-radius: 16px;

        background: rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.10);
      }

      #dollBtns.hidden {
        display: none;
      }

      .dollBtn {
        min-width: calc(144px * var(--desktop-doll-ui-scale) * var(--ui-responsive-scale));
        height: calc(78px * var(--desktop-doll-ui-scale) * var(--ui-responsive-scale));
        padding: 0 calc(27px * var(--desktop-doll-ui-scale) * var(--ui-responsive-scale));
        border-radius: 24px;
        font-size: calc(19.5px * var(--desktop-doll-ui-scale) * var(--ui-responsive-scale));
        justify-content: center;
        text-align: center;

        /* inactive look = like INTERIOR tab */
        --btn-bg: var(--tab-inactive-bg);
        --btn-text: var(--tab-inactive-text);

        /* hover invert to active */
        --btn-bg-hover: var(--midnight-purple);
        --btn-text-hover: rgba(255, 255, 255, 0.98);

        /* stroke colors */
        --btn-stroke: var(--tab-inactive-text);
        --btn-stroke-hover: var(--tab-active-text);

        transform: scale(var(--tab-scale-inactive));
        transform-origin: center;

        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          background 140ms ease,
          color 140ms ease;
      }

      /* ✅ Hover only for NON-active doll buttons */
      .dollBtn:hover:not(:disabled):not(.active) {
        transform: scale(calc(var(--tab-scale-inactive) + 0.02)) translateY(-1px);
      }

      .dollBtn:active:not(:disabled):not(.active) {
        transform: scale(calc(var(--tab-scale-inactive) + 0.01));
      }

      .dollBtn.active {
        /* active look = like DOLLHOUSE tab */
        --btn-bg: var(--tab-active-bg);
        --btn-text: var(--tab-active-text);

        background:
          linear-gradient(var(--tab-active-bg), var(--tab-active-bg)) padding-box,
          var(--chrome-stroke-material) border-box;
        background-clip: padding-box, border-box;

        transform: scale(var(--tab-scale-active));
        box-shadow:
          0 12px 28px rgba(0,0,0,0.38),
          inset 0 1px 0 rgba(255,255,255,0.10);
      }

      .dollBtn:not(.active) {
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.22),
          inset 0 -1px 0 rgba(8, 4, 14, 0.72),
          0 12px 24px rgba(8, 4, 14, 0.52);
      }

      /* ✅ REMOVE active hover/active animation (selected stays still) */
      /* (intentionally no .dollBtn.active:hover or :active rules) */

      #dollhouseHint {
        position: absolute;
        left: 0;
        right: 0;
        top: calc(16px * var(--ui-responsive-scale));
        width: max-content;
        margin-inline: auto;
        z-index: 24;
        pointer-events: none;
        opacity: 0;
        visibility: hidden;
        padding: calc(11.5px * var(--ui-responsive-scale)) calc(18.4px * var(--ui-responsive-scale));
        border-radius: 999px;
        border: var(--container-stroke-width) solid transparent;
        background:
          linear-gradient(var(--midnight-purple), var(--midnight-purple)) padding-box,
          var(--chrome-stroke-material) border-box;
        background-clip: padding-box, border-box;
        box-shadow:
          inset 0 1px 0 var(--chrome-specular-top),
          inset 0 -1px 0 rgba(89, 102, 124, 0.56),
          inset 1px 0 0 var(--chrome-specular-edge),
          0 10px 18px rgba(10, 14, 24, 0.35);
        color: rgba(255, 255, 255, 0.96);
        font-size: calc(17.25px * var(--ui-responsive-scale));
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        text-align: center;
        white-space: nowrap;
        max-width: min(72vw, 640px);
        transition: opacity 220ms ease, visibility 220ms ease;
      }

      #dollhouseHint.visible {
        opacity: 1;
        visibility: visible;
      }

      /* =============================
         BEGIN TOUR OVERLAY
      ============================== */

      #startOverlay {
        position: absolute;
        inset: 0;
        z-index: 50;
        display: grid;
        place-items: center;
        background: #ffffff;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        transition: opacity 300ms ease, background-color 120ms ease;
      }

      #startOverlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #startOverlay.videoMode {
        background: #ffffff;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }

      #startCard {
        position: relative;
        display: inline-block;
        z-index: 2;
        text-align: center;
        animation: startCardFloat 1.1s ease-in-out infinite;
      }

      #startCard.hidden {
        display: none;
      }

      #startCard:hover {
        animation-play-state: paused;
      }
      #startCard:hover::after {
        animation-play-state: paused;
      }

      #startCard::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: calc(-14px * var(--ui-responsive-scale));
        width: 95%;
        height: calc(18px * var(--ui-responsive-scale));
        border-radius: 999px;
        background: rgba(10, 14, 24, 0.42);
        filter: blur(6px);
        transform: translateX(-50%);
        pointer-events: none;
        z-index: 1;
        animation: startCardShadowCounter 1.1s ease-in-out infinite;
      }

      @keyframes startCardFloat {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      @keyframes enterHomeFloat {
        0%,
        100% {
          transform: translateX(-50%) translateY(0px);
        }
        50% {
          transform: translateX(-50%) translateY(-6px);
        }
      }

      @keyframes startCardShadowCounter {
        0%,
        100% {
          transform: translateX(-50%) translateY(0px);
        }
        50% {
          transform: translateX(-50%) translateY(6px);
        }
      }

      #startBtn,
      #enterHomeBtn {
        position: relative;
        z-index: 2;
        appearance: none;
        border: var(--container-stroke-width) solid transparent;
        cursor: pointer;

        padding: calc(21px * var(--ui-responsive-scale)) calc(30px * var(--ui-responsive-scale));
        border-radius: 18px;
        font-size: calc(22.5px * var(--ui-responsive-scale));
        font-weight: 800;
        letter-spacing: 0.10em;
        text-transform: uppercase;

        background:
          linear-gradient(var(--midnight-purple), var(--midnight-purple)) padding-box,
          var(--chrome-stroke-material) border-box;
        background-clip: padding-box, border-box;
        color: rgba(255, 255, 255, 0.95);
        box-shadow:
          inset 0 1px 0 var(--chrome-specular-top),
          inset 0 -1px 0 rgba(89, 102, 124, 0.56),
          inset 1px 0 0 var(--chrome-specular-edge);

        transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
      }

      #startBtn:hover,
      #enterHomeBtn:hover {
        background:
          linear-gradient(var(--midnight-purple-hover), var(--midnight-purple-hover)) padding-box,
          var(--chrome-stroke-material) border-box;
        background-clip: padding-box, border-box;
        transform: translateY(-1px);
        box-shadow:
          inset 0 1px 0 var(--chrome-specular-top),
          inset 0 -1px 0 rgba(89, 102, 124, 0.64),
          inset 1px 0 0 var(--chrome-specular-edge);
      }

      #startBtn:active,
      #enterHomeBtn:active {
        background:
          linear-gradient(var(--midnight-purple-active), var(--midnight-purple-active)) padding-box,
          var(--chrome-stroke-material) border-box;
        background-clip: padding-box, border-box;
        transform: translateY(0px);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.45),
          inset 0 -1px 0 rgba(89, 102, 124, 0.62),
          inset 1px 0 0 rgba(245, 250, 255, 0.35);
      }

      #enterHomeBtn:disabled {
        opacity: 0.45;
        cursor: default;
      }

      #introVideo {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #ffffff;

        opacity: 0;
        transition: opacity 120ms ease-in-out;

        pointer-events: none;
        z-index: 1;
      }
      #introVideo.show {
        opacity: 1;
      }

      @media (max-width: 820px), (max-aspect-ratio: 1/1) {
        :root {
          /* mobile-only tuning */
          --ui-responsive-scale: 0.78;
          --desktop-primary-ui-scale: 1;
          --desktop-nav-ui-scale: 1;
          --desktop-doll-ui-scale: 1;
          --view-tabs-width: min(75.6vw, 324px);
          --ui-safe-bottom: max(12px, env(safe-area-inset-bottom));
        }

        /* keep the iframe root neutral so the parent embed can own rounded corners */
        #playerShell {
          padding: 0;
          box-sizing: border-box;
          background: transparent;
        }

        #playerStage,
        #app {
          background: transparent;
          overflow: hidden;
        }

        #startOverlay {
          display: grid;
          place-items: center;
          justify-items: center;
        }

        #startCard {
          justify-self: center;
          margin-inline: auto;
          width: max-content;
          max-width: calc(100vw - 24px);
        }

        /* TOP: tabs become centered and responsive */
        #tabs {
          left: 0;
          right: 0;
          top: max(10px, env(safe-area-inset-top));
          transform: none;
          margin-inline: auto;
          width: var(--view-tabs-width);
          max-width: 75.6vw;
          justify-content: stretch;
          align-items: stretch;
          gap: 7px;
          padding: 7px;
        }

        #tabs > * {
          flex: 1 1 0;
          min-width: 0;
        }

        #interiorStack {
          flex: 1 1 0;
          min-width: 0;
          width: 100%;
        }

        /* allow tabs to shrink and not overflow */
        .tabBtn {
          min-width: 0 !important;
          flex: 1 1 0;
          width: 100%;
          height: auto;
          padding: 10.8px 9px;
          font-size: 11.34px;
          border-radius: 14.4px;
          letter-spacing: 0.10em;
        }

        /* 360 control: center under tabs */
        #pano360Control {
          left: 0;
          right: 0;
          top: calc(max(10px, env(safe-area-inset-top)) + 66px);
          transform: none;
          margin-inline: auto;
          width: min(78vw, 310px);
          max-width: 78vw;
          justify-content: center;
          align-items: center;
          gap: 8px;
        }

        #pano360Label {
          font-size: 8.84px;
          padding: 0 8.5px;
          height: 18.7px;
          border-radius: 9.35px;
          white-space: nowrap;
        }

        #pano360Switch {
          width: 79.9px;
          height: 28.9px;
          font-size: 8.5px;
        }

        #pano360Switch .offText,
        #pano360Switch .onText {
          top: 0;
          bottom: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          transform: none;
        }

        #pano360Switch .switchKnob {
          left: 3px;
          top: 50%;
          width: 34px;
          height: 23.8px;
          transform: translateY(-50%);
        }

        #pano360Switch.isOn .switchKnob {
          transform: translate(40.8px, -50%);
        }

        /* Brand link: keep it from colliding */
        #brandLink {
          display: none !important;
          opacity: 0 !important;
          pointer-events: none !important;
        }

        /* DOLL buttons: align bottom edge with the interior nav row */
        #dollBtns {
          left: 0;
          right: 0;
          bottom: var(--ui-safe-bottom);
          transform: none;
          margin-inline: auto;
          width: min(84vw, 360px);
          max-width: 84vw;
          justify-content: center;
          gap: 8px;
          padding: 8px;
        }

        .dollBtn {
          min-width: 0 !important;
          width: auto;
          flex: 1 1 0;
          height: auto;
          padding: 12px 10px;
          font-size: 13px;
          border-radius: 16px;
          letter-spacing: 0.10em;
        }

        #indicator {
          display: none !important;
          opacity: 0 !important;
          pointer-events: none !important;
        }

        #roomLabel {
          left: 50% !important;
          right: auto !important;
          bottom: calc(var(--ui-safe-bottom) + 58px) !important;
          transform: translateX(-50%) !important;
          width: max-content !important;
          max-width: calc(100vw - 24px) !important;
          padding: calc(9.18px * var(--ui-responsive-scale)) calc(12.24px * var(--ui-responsive-scale)) !important;
          border-radius: calc(9.18px * var(--ui-responsive-scale)) !important;
          font-size: calc(11.475px * var(--ui-responsive-scale)) !important;
          text-align: center !important;
        }

        #dollhouseHint {
          top: auto;
          bottom: calc(var(--ui-safe-bottom) + 64px);
          left: 0;
          right: 0;
          width: max-content;
          max-width: calc(100vw - 24px);
          margin-inline: auto;
          padding: calc(16px * var(--ui-responsive-scale)) calc(24px * var(--ui-responsive-scale));
          font-size: calc(23px * var(--ui-responsive-scale));
          white-space: normal;
        }

        #enterHomeWrap {
          left: 50%;
          right: auto;
          bottom: calc(var(--ui-safe-bottom) + 2px);
          transform: translateX(-50%);
          width: max-content;
          max-width: calc(100vw - 24px);
          margin-inline: auto;
        }

        #startBtn,
        #enterHomeBtn {
          display: block;
          margin-inline: auto;
        }

        /* NAV: center it, make buttons equal width, remove large min-width */
        #navWrap {
          left: 0;
          right: 0;
          bottom: var(--ui-safe-bottom);
          transform: none;
          margin-inline: auto;
          width: min(69.7vw, 357px);
          justify-content: center;
        }

        #nav {
          width: 100%;
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 8px;
        }

        #nav button {
          min-width: 0 !important;          /* critical: remove desktop min width */
          width: 100%;
          height: 46px;                      /* stable tap target */
          padding: 0 10px;
          font-size: 11.6px;
          letter-spacing: 0.10em;
          border-radius: 14px;
        }

        #nav button:hover:not(:disabled):not(.active),
        #nav button:active:not(:disabled):not(.active) {
          background:
            linear-gradient(var(--tab-active-bg), var(--tab-active-bg)) padding-box,
            var(--chrome-stroke-material) border-box;
          background-clip: padding-box, border-box;
          color: rgba(255, 255, 255, 0.98);
          transform: none;
          box-shadow:
            0 12px 28px rgba(0,0,0,0.38),
            inset 0 1px 0 rgba(255,255,255,0.10);
        }
      }
    </style>
  </head>

  <body>
    <div id="playerShell">
      <div id="playerStage">
        <div id="app">
        <div id="tabs">
          <div id="interiorStack">
            <button id="tabPano" class="uiBtn tabBtn active" type="button">INTERIOR</button>
          </div>
          <button id="tabDollhouse" class="uiBtn tabBtn hasStroke" type="button">DOLLHOUSE</button>
        </div>

        <div id="pano360Control" class="hidden" aria-label="360 camera control">
          <div id="pano360Label">360&deg; camera view</div>
          <button id="pano360Switch" type="button" role="switch" aria-checked="false">
            <span class="offText">OFF</span>
            <span class="onText">ON</span>
            <span class="switchKnob" aria-hidden="true"></span>
          </button>
        </div>

        <a
          id="brandLink"
          href="https://rtfmediasolutions.com"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Open rtfmediasolutions.com"
        >
          <img id="brandLogo" alt="RTF Media Solutions" draggable="false" />
          <span id="brandText" class="hidden">rtfmediasolutions.com</span>
        </a>

        <div id="dollBtns" class="hidden" aria-label="Dollhouse model selector">
          <button id="btnFull" class="uiBtn dollBtn active" type="button">FULL</button>
          <button id="btnUp" class="uiBtn dollBtn hasStroke" type="button">UP</button>
          <button id="btnDown" class="uiBtn dollBtn hasStroke" type="button">DOWN</button>
        </div>

        <div id="dollhouseHint" aria-live="polite">Click Spheres To View</div>

        <div id="startOverlay" aria-label="Begin tour overlay">
          <div id="startCard">
            <button id="startBtn" type="button">BEGIN TOUR</button>
          </div>
          <video id="introVideo" playsinline muted></video>
        </div>

        <video id="transitionVideo" playsinline muted preload="auto"></video>

        <div id="indicator">01 / 21</div>
        <div id="enterHomeWrap" class="hidden">
          <button id="enterHomeBtn" type="button">ENTER HOME</button>
        </div>

        <div id="navWrap">
          <div id="nav">
            <button id="backBtn" class="uiBtn" aria-label="Back" type="button">BACK</button>
            <button id="forwardBtn" class="uiBtn" aria-label="Next" type="button">NEXT</button>
          </div>
        </div>
      </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
